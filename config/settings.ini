# WiiU-Bypass Configuration
# Lines starting with # are comments
#
# Strategy guide:
#   0 = SPLIT      - Split TCP data into 2 fragments (default, works for most ISPs)
#   1 = MULTISPLIT - Send overlapping data chunks (for aggressive DPI)
#   2 = FAKEDSPLIT - Send fake TLS first, then fragment real data
#   3 = DELAY      - Byte-by-byte with large delays (slow but thorough)
#   4 = RAW        - No manipulation (diagnostic mode)

[Main]
enabled = 1
strategy = 0
show_notification = 1

[TCP]
fragment_size = 2
inter_fragment_delay_us = 1000
split_position = 0

[UDP]
udp_bypass = 1
udp_fake_port_start = 60000
udp_fake_port_end = 65535

[DNS]
doh_server = 1.1.1.1
doh_port = 443
